<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nearby Audio</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="css/styles.css?v=6">
</head>
<body>
  <div id="map"></div>

  <div class="topbar">
    <h1>Nearby Audio</h1>
    <div class="sub" id="sub">Tap a pin to play an article</div>
  </div>

  <div class="search-bar">
    <div class="search-icon"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></div>
    <input type="text" id="searchInput" placeholder="Search places..." autocomplete="off">
    <button class="search-clear" id="searchClear">&times;</button>
  </div>
  <div class="search-results" id="searchResults"></div>
  <button class="filter-btn" id="filterBtn" title="Filter categories">
    <svg viewBox="0 0 24 24"><path d="M10 18h4v-2h-4v2zM3 6v2h18V6H3zm3 7h12v-2H6v2z"/></svg>
  </button>
  <div class="filter-sheet" id="filterSheet"></div>
  <button class="search-area-btn" id="searchAreaBtn">Search this area</button>

  <div class="floating-controls">
    <div class="fc-group">
      <button class="fc-btn" id="zoomInBtn" title="Zoom in">+</button>
      <button class="fc-btn" id="zoomOutBtn" title="Zoom out">&minus;</button>
    </div>
    <div class="fc-single">
      <button class="fc-btn" id="recenterBtn" title="My location">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0013 3.06V1h-2v2.06A8.994 8.994 0 003.06 11H1v2h2.06A8.994 8.994 0 0011 20.94V23h2v-2.06A8.994 8.994 0 0020.94 13H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
      </button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <div class="empty-state" id="emptyState">
    <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
    <p>No articles found in this area.<br>Try searching a different location.</p>
  </div>

  <!-- Player: Spotify now-playing paradigm -->
  <div class="player" id="player">
    <!-- Drag handle (peek + expanded) -->
    <div class="player-handle-area" id="playerHandle"><div class="player-handle"></div></div>

    <!-- Top bar: minimize / title / stop -->
    <div class="player-top">
      <button class="player-top-btn" id="playerMinimize" title="Minimize">
        <svg viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
      </button>
      <img class="player-top-thumb" id="playerThumbImg" alt="">
      <div class="player-top-info">
        <div class="player-title" id="playerTitle"></div>
        <div class="player-section-label" id="playerSectionLabel"></div>
      </div>
      <button class="player-top-btn" id="playerClose" title="Stop">
        <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>

    <!-- Scrollable article text -->
    <div class="player-text" id="playerText"></div>

    <!-- Progress bar -->
    <div class="player-progress">
      <div class="player-progress-bar"><div class="player-progress-fill" id="playerProgressFill"></div></div>
      <div class="player-progress-text" id="playerProgressText"></div>
    </div>

    <!-- Play controls (thumb zone) -->
    <div class="player-controls">
      <button class="pc-btn pc-speed" id="speedBtn" title="Playback speed">1x</button>
      <button class="pc-btn" id="prevSectionBtn" title="Previous section">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="pc-btn pc-main" id="playPauseBtn" title="Play/Pause">
        <svg viewBox="0 0 24 24" id="playPauseIcon"><path d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>
      </button>
      <button class="pc-btn" id="nextSectionBtn" title="Next section">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zm10-12v12h2V6z"/></svg>
      </button>
      <button class="pc-btn pc-hd" id="hdVoiceBtn" title="HD Voice">HD Audio</button>
    </div>

    <!-- Sections strip (below controls, like Spotify "About the artist") -->
    <div class="player-sections-strip" id="playerSectionsStrip">
      <div id="sectionsList"></div>
    </div>
  </div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module" src="js/app.js?v=6"></script>
</body>
</html>
